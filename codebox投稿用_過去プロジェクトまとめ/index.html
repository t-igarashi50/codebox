<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>codebox投稿用 過去プロジェクトまとめ</title>
    <style>
      body {
        margin: 0;
        background: #f7f8fb;
        color: #08131a;
        font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
      }
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.25;
      }
      p {
        line-height: 1.8;
        color: #475569;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-top: 24px;
      }
      .card {
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #fff;
        padding: 18px;
      }
      .tag {
        display: inline-block;
        margin-bottom: 10px;
        border-radius: 999px;
        background: #dbeafe;
        color: #2563eb;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="tag">codebox投稿用</span>
      <h1>AIで作った過去プロジェクトまとめ</h1>
      <p>
        LP、Webサイト、音声編集ツール、デザイン補助ツールなど、過去にAIで作ったものを投稿テスト用に軽くまとめたファイルです。
      </p>
      <section class="grid">
        <div class="card"><strong>ASMR音声編集ツール</strong><p>音声編集をAIで補助するデスクトップツール。</p></div>
        <div class="card"><strong>LP制作</strong><p>会社、求人、店舗向けのランディングページ制作。</p></div>
        <div class="card"><strong>PSD文字入れツール</strong><p>画像やデザイン作業を楽にする補助ツール。</p></div>
        <div class="card"><strong>codebox</strong><p>AIで作ったものを貼るためのコミュニティMVP。</p></div>
      </section>
    </main>
  </body>
</html>
